name: Build offact-tks headless

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ps5-payload-sdk
        run: |
          wget -q https://github.com/ps5-payload-dev/sdk/releases/latest/download/ps5-payload-sdk.zip
          sudo unzip -q -d /opt ps5-payload-sdk.zip

      - name: Build
        run: |
          export PS5_PAYLOAD_SDK=/opt/ps5-payload-sdk
          make -f Makefile.headless

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: offact-tks
          path: offact-tks.elf
